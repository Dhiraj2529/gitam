<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitam | Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <main class="auth-layout">
        <section class="auth-panel">
            <p class="eyebrow">Create your account</p>
            <h1>Start your music space</h1>
            <p class="muted">This project uses browser storage only, so it stays static and deployable on GitHub Pages.</p>
        </section>

        <section class="auth-card">
            <h2>Sign up</h2>
            <p id="msg1" class="form-message error"></p>
            <p id="msg2" class="form-message success"></p>

            <label for="signup-username">Username</label>
            <input type="text" id="signup-username" placeholder="Dhiraj2007" required>

            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="abc@gmail.com" required>

            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Create password" required>

            <label for="signup-confirm-password">Confirm Password</label>
            <input type="password" id="signup-confirm-password" placeholder="Confirm password" required>

            <button type="button" class="primary-btn" onclick="signup()">Create account</button>
            <p class="muted">Already registered? <a href="login.html">Login</a></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
