<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitam | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <main class="auth-layout">
        <section class="auth-panel">
            <p class="eyebrow">Welcome back</p>
            <h1>Login to Gitam</h1>
            <p class="muted">Your account is stored locally in the browser so the project works on GitHub Pages too.</p>
        </section>

        <section class="auth-card">
            <h2>Sign in</h2>
            <p id="msg1" class="form-message error"></p>
            <p id="msg2" class="form-message success"></p>

            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="abc@gmail.com" required>

            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter password" required>

            <button type="button" class="primary-btn" onclick="login()">Login</button>
            <p class="muted">New here? <a href="signup.html">Create an account</a></p>
            <p class="muted"><a href="index.html">Skip to home</a></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
